<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burgos Meteo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- =========================================
     NAVIGATION
     ========================================= -->
<nav>
  <div class="nav-left">
    <div class="nav-logo">🌤️ Burgos Meteo</div>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <a href="https://burgosweb.net" data-i18n="nav_portfolio">← Portfolio</a>
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('it')">IT</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>
  </div>
</nav>

<!-- =========================================
     SEARCH SECTION
     ========================================= -->
<section class="search-section">
  <div class="search-header">
    <h1>🌍 <span data-i18n="hero_title">Weather Forecast</span></h1>
    <p class="hero-sub" data-i18n="hero_sub">Search for any city in the world</p>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-search" data-i18n="mode_search" onclick="setMode('search')">Search</button>
    <button class="mode-btn" id="mode-compare" data-i18n="mode_compare" onclick="setMode('compare')">Compare</button>
  </div>

  <!-- Single city search -->
  <div id="panel-search" class="search-box">
    <input
      type="text"
      id="city-input"
      class="search-input"
      data-i18n-placeholder="search_placeholder"
      aria-label="City name"
      autocomplete="off"
    >
    <button id="search-btn" class="btn-primary" data-i18n="search_btn">Search</button>
  </div>

  <!-- Compare two cities -->
  <div id="panel-compare" class="compare-inputs hidden">
    <div class="compare-row">
      <input
        type="text"
        id="city-input-a"
        class="search-input"
        data-i18n-placeholder="compare_city1"
        aria-label="First city"
        autocomplete="off"
      >
      <span class="compare-vs">vs</span>
      <input
        type="text"
        id="city-input-b"
        class="search-input"
        data-i18n-placeholder="compare_city2"
        aria-label="Second city"
        autocomplete="off"
      >
    </div>
    <button id="compare-btn" class="btn-primary" data-i18n="compare_btn">Compare</button>
  </div>
</section>

<hr class="divider">

<!-- =========================================
     LOADING
     ========================================= -->
<div id="loading" class="loading-box hidden">
  <div class="spinner"></div>
  <p data-i18n="loading">Loading...</p>
</div>

<!-- =========================================
     ERROR
     ========================================= -->
<div id="error-msg" class="error-box hidden"></div>

<!-- =========================================
     WEATHER RESULT (single)
     ========================================= -->
<section id="result-section" class="result-section hidden">
  <div id="current-weather"></div>
  <div id="forecast-container"></div>
</section>

<!-- =========================================
     COMPARE RESULT
     ========================================= -->
<section id="compare-section" class="result-section hidden">
  <div id="compare-cards" class="compare-cards"></div>
</section>

<!-- =========================================
     FOOTER
     ========================================= -->
<footer>
  <p>
    <span data-i18n="footer_powered">Powered by</span>
    <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>
    · Made by <a href="https://burgosweb.net">Eduardo Burgos</a>
  </p>
</footer>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
</body>
</html>
